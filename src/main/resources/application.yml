server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trading
    username: trading
    password: trading123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:change-me-in-prod-please-rotate-this-secret}
  expiration-ms: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
